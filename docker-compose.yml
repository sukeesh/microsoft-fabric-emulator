# Local stand-in for the Microsoft Fabric SQL endpoint.
# Fabric's Warehouse / SQL analytics endpoint speaks TDS + T-SQL, i.e. it is
# wire-compatible with SQL Server. So a real SQL Server 2022 IS the mock.
#
# On Apple Silicon the official image is x86-only -> run under linux/amd64 (Rosetta).
services:
  fabric-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: fabric-local-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "${SQL_HOST_PORT:-1433}:1433"
    volumes:
      - fabric-sql-data:/var/opt/mssql
    healthcheck:
      # -C trusts the self-signed dev cert; -No forces encryption off-cert-check.
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa
        -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  fabric-sql-data:
